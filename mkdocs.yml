site_name: pydantic-ai-provenance
site_description: Provenance tracking and citation verification for pydantic-ai agents
site_url: https://dugarsumit.github.io/pydantic-ai-provenance
repo_url: https://github.com/dugarsumit/pydantic-ai-provenance
repo_name: dugarsumit/pydantic-ai-provenance
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Citation Format: guides/citation-format.md
      - Citation Verification: guides/verification.md
      - Multi-Agent Usage: guides/multi-agent.md
      - Visualization: guides/visualization.md
  - API Reference: api-reference.md

plugins:
  - search
